name: Feature request
description: Suggest an improvement for Repo Growth.
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What are you trying to accomplish, and why is the current behavior insufficient?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the desired workflow input, output, or visual behavior.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe any workarounds or alternative designs you considered.
  - type: checkboxes
    id: compatibility
    attributes:
      label: Compatibility
      options:
        - label: This can remain optional and preserve the current default behavior.
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues for a similar request.
          required: true
